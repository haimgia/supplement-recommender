version: "3.9"

services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui-supplement-recommender

    ports:
      - "3000:8080"

    environment:
      - OPENAI_API_KEY=none
      - HF_TOKEN=hf_your_token_here

    volumes:
      - ./skills:/app/backend/data/skills